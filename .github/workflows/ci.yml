name: CI

on:
  push:
    branches: ["**"]
    tags: ["*"]
  pull_request:

permissions:
  contents: read
  pull-requests: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: QaaS.Common.Probes.sln
  PROJECT_TO_PACK: QaaS.Common.Probes/QaaS.Common.Probes.csproj
  PACKAGE_OUTPUT_DIRECTORY: ${{ github.workspace }}\BuildOutput

jobs:
  build-test-deploy:
    name: Build, Test & Deploy
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate package metadata
        shell: powershell
        run: |
          [xml]$project = Get-Content ${{ env.PROJECT_TO_PACK }}
          $description = ($project.Project.PropertyGroup | Where-Object { $_.Description } | Select-Object -First 1).Description
          if ([string]::IsNullOrWhiteSpace($description)) {
            Write-Host "No package Description found in ${{ env.PROJECT_TO_PACK }}, skipping metadata validation."
            exit 0
          }

          $packageReadmeFile = ($project.Project.PropertyGroup | Where-Object { $_.PackageReadmeFile } | Select-Object -First 1).PackageReadmeFile
          $includeSymbols = ($project.Project.PropertyGroup | Where-Object { $_.IncludeSymbols } | Select-Object -First 1).IncludeSymbols
          $symbolPackageFormat = ($project.Project.PropertyGroup | Where-Object { $_.SymbolPackageFormat } | Select-Object -First 1).SymbolPackageFormat

          $readmeLinked = $false
          foreach ($itemGroup in $project.Project.ItemGroup) {
            foreach ($noneItem in @($itemGroup.None)) {
              if ($noneItem.Link -eq "README.md" -and $noneItem.Pack -eq "true") {
                $readmeLinked = $true
              }
            }
          }

          $errors = @()
          if ([string]::IsNullOrWhiteSpace($packageReadmeFile)) {
            $errors += "PackageReadmeFile must be set for package projects."
          }
          if (-not $readmeLinked) {
            $errors += "README.md must be included in package items with Pack=true and Link=README.md."
          }
          if ("$includeSymbols".ToLowerInvariant() -ne "true") {
            $errors += "IncludeSymbols must be true for package projects."
          }
          if ("$symbolPackageFormat".ToLowerInvariant() -ne "snupkg") {
            $errors += "SymbolPackageFormat must be snupkg for package projects."
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

          Write-Host "Package metadata validation passed."

      - name: Restore packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration ${{ env.CONFIGURATION }}

      - name: Test solution
        run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore --maxcpucount

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        uses: battila7/get-version-action@v2

      - name: Validate SemVer tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version-without-v }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-(alpha|beta)\.[0-9]+)?$ ]]; then
            echo "Error: '$VERSION' is not a valid version."
            exit 1
          fi

      - name: Pack QaaS.Common.Probes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          dotnet pack ${{ env.PROJECT_TO_PACK }} `
            --no-restore `
            --configuration ${{ env.CONFIGURATION }} `
            --include-symbols `
            -p:PackageVersion=${{ steps.version.outputs.version-without-v }} `
            --output ${{ env.PACKAGE_OUTPUT_DIRECTORY }}

      - name: Push QaaS.Common.Probes to NuGet
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          $packages = Get-ChildItem "${{ env.PACKAGE_OUTPUT_DIRECTORY }}\QaaS.Common.Probes.*.nupkg"
          foreach ($package in $packages) {
            # Only push the main QaaS.Common.Probes package, not QaaS.Common.Probes.* (e.g., QaaS.Common.Probes.Tests)
            if ($package.Name -match "^QaaS\.Common\.Probes\.[0-9]") {
              dotnet nuget push $package.FullName -k ${{ secrets.NUGET_AUTH_TOKEN }} -s https://api.nuget.org/v3/index.json
            }
          }
